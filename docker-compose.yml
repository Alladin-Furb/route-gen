services:
  route-gen-db:
    image: postgres:17
    container_name: route-gen-db
    environment:
      POSTGRES_DB: ${ROUTE_GEN_DB_NAME:-route_gen_db}
      POSTGRES_USER: ${ROUTE_GEN_DB_USER:-route_user}
      POSTGRES_PASSWORD: ${ROUTE_GEN_DB_PASSWORD:-route_pass}
    ports:
      - "5432:5432"
    volumes:
      - route-gen-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${ROUTE_GEN_DB_USER:-route_user}", "-d", "${ROUTE_GEN_DB_NAME:-route_gen_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  route-generator:
    build: .
    container_name: route-generator
    ports:
      - "8085:8080"
    environment:
      ConnectionStrings__DefaultConnection: Host=route-gen-db;Port=5432;Database=${ROUTE_GEN_DB_NAME:-route_gen_db};Username=${ROUTE_GEN_DB_USER:-route_user};Password=${ROUTE_GEN_DB_PASSWORD:-route_pass}
      Services__AttendanceBaseUrl: ${ATTENDANCE_BASE_URL:-}
      Services__RegisterBaseUrl: ${REGISTER_BASE_URL:-}
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
    depends_on:
      route-gen-db:
        condition: service_healthy

volumes:
  route-gen-db-data:
